name = "scarlett-paper-collector"
main = "worker/collector.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Free tier: 100,000 requests/day, 10ms CPU/invocation
# 1-minute cron = 1440 requests/day — well within free limits

[[triggers]]
crons = ["* * * * *"]   # every minute, free on Cloudflare Workers

[[kv_namespaces]]
binding = "PAPER_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"    # set after: wrangler kv:namespace create PAPER_KV

# Environment variables — set via: wrangler secret put NETLIFY_TICK_URL
# or in the Cloudflare dashboard under Workers > Settings > Variables
# NETLIFY_TICK_URL = "https://your-site.netlify.app/paper/tick"
